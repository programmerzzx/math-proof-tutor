<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员中心 - 数学证明导师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .header h1 { color: #333; margin-bottom: 10px; }
        .header a { color: #667eea; text-decoration: none; }
        .membership-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .card.popular {
            border: 2px solid #667eea;
        }
        .card.popular::before {
            content: '推荐';
            position: absolute;
            top: 15px;
            right: -30px;
            background: #667eea;
            color: white;
            padding: 5px 40px;
            font-size: 12px;
            transform: rotate(45deg);
        }
        .card h3 { font-size: 24px; color: #333; margin-bottom: 10px; }
        .price { font-size: 48px; color: #667eea; font-weight: bold; }
        .price small { font-size: 16px; color: #999; }
        .features { margin: 20px 0; text-align: left; }
        .features li { padding: 8px 0; list-style: none; }
        .features li::before { content: '✓ '; color: #4CAF50; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="header">
        <h1>会员中心</h1>
        <p>选择适合你的会员方案</p>
        <a href="/">← 返回首页</a>
    </div>
    
    <div class="membership-cards">
        <div class="card">
            <h3>月度会员</h3>
            <div class="price">¥9.9<small>/月</small></div>
            <ul class="features">
                <li>500道题目额度</li>
                <li>每日50次OCR识别</li>
                <li>深度分析报告</li>
                <li>讨论区发言权限</li>
            </ul>
            <button class="btn" onclick="alert('请联系管理员开通')">立即开通</button>
        </div>
        
        <div class="card popular">
            <h3>年度会员</h3>
            <div class="price">¥49<small>/年</small></div>
            <p style="color:#999;font-size:14px;margin-top:-10px;">月均仅¥4.1</p>
            <ul class="features">
                <li>无限题目额度</li>
                <li>无限OCR识别</li>
                <li>深度分析报告</li>
                <li>专属练习题库</li>
                <li>学习进度追踪</li>
            </ul>
            <button class="btn" onclick="alert('请联系管理员开通')">立即开通</button>
        </div>
        
        <div class="card">
            <h3>终身会员</h3>
            <div class="price">¥149<small>永久</small></div>
            <ul class="features">
                <li>所有年度会员权益</li>
                <li>永久免费更新</li>
                <li>优先客服支持</li>
                <li>专属功能优先体验</li>
            </ul>
            <button class="btn" onclick="alert('请联系管理员开通')">立即开通</button>
        </div>
    </div>
</body>
</html>
