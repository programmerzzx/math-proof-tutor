<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的会员 - 数学证明导师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .status-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }
        .status-icon { font-size: 64px; }
        .status-text { color: #666; margin-top: 10px; }
        .back { margin-top: 30px; }
        .back a { color: #667eea; text-decoration: none; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的会员</h1>
        
        <div class="status-box">
            <div class="status-icon">👤</div>
            <p class="status-text">当前状态：<strong>免费用户</strong></p>
            <p class="status-text">题目额度：100道/月</p>
            <p class="status-text">OCR识别：5次/日</p>
        </div>
        
        <p style="color:#999;">升级会员解锁更多功能</p>
        <a href="/membership" class="btn">立即升级</a>
        
        <div class="back">
            <a href="/">← 返回首页</a>
        </div>
    </div>
</body>
</html>
