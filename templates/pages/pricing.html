<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定价方案 - 数学证明导师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #333; }
        .price-highlight { color: #667eea; font-weight: bold; font-size: 20px; }
        .back { text-align: center; }
        .back a { color: #667eea; text-decoration: none; }
        .note {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 定价方案</h1>
        
        <table>
            <thead>
                <tr>
                    <th>方案</th>
                    <th>价格</th>
                    <th>单次成本</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>月度会员</td>
                    <td class="price-highlight">¥9.9/月</td>
                    <td>约¥0.02/次</td>
                </tr>
                <tr style="background:#f0f0ff;">
                    <td><strong>年度会员（推荐）</strong></td>
                    <td class="price-highlight">¥49/年</td>
                    <td>约¥0.01/次</td>
                </tr>
                <tr>
                    <td>终身会员</td>
                    <td class="price-highlight">¥149永久</td>
                    <td>一次付费永久使用</td>
                </tr>
            </tbody>
        </table>
        
        <div class="note">
            💡 提示：年度会员月均仅¥4.1，性价比最高！
        </div>
        
        <div class="back">
            <a href="/">← 返回首页</a> | <a href="/membership">开通会员</a>
        </div>
    </div>
</body>
</html>
