[railway]
  plugin = "nixpacks"

[railway.build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[railway.run]
  command = "gunicorn app:app --bind 0.0.0.0:${PORT} --workers 2 --timeout 120"

[deployment]
  region = "us-west2"
  numReplicas = 1

[environment]
  PYTHON_VERSION = "3.11"
